<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Petsona — 06 Personality</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="components.css" />
<link rel="stylesheet" href="screens.css" />
</head>
<body class="is-cat-mode">
<main class="design-stage">
  <div class="frame">
    <div class="phone">
      <div class="notch"></div>
      <div class="screen-canvas">
        <section class="screen survey">
          <div class="pet-pattern"></div>
          <div class="statusbar"><span>9:41</span><span class="icons"><span class="battery"></span></span></div>
          <div class="top">
            <button class="back-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back</button>
            <div class="progress-dots"><span class="is-active"></span><span></span><span></span></div>
            <span class="caption">1 / 3</span>
          </div>
          <div class="question">
            <h1>Which sounds most like Mochi?</h1>
            <p>Pick the closest match.</p>
          </div>
          <div class="options">
            <button class="opt-card is-selected">
              <span class="icon-mark"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
              <div class="opt-meta"><span class="opt-title">Zoomies all day</span><span class="opt-sub">High energy, hard to tire out</span></div>
              <span class="checkbox-paw checked"><span class="paw-icon"></span></span>
            </button>
            <button class="opt-card">
              <span class="icon-mark"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4" y1="12" x2="20" y2="12"/></svg></span>
              <div class="opt-meta"><span class="opt-title">Balanced</span><span class="opt-sub">Bursts of energy, content to rest</span></div>
              <span class="checkbox-paw"></span>
            </button>
            <button class="opt-card">
              <span class="icon-mark"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
              <div class="opt-meta"><span class="opt-title">Pretty chill</span><span class="opt-sub">Mostly relaxed, naps a lot</span></div>
              <span class="checkbox-paw"></span>
            </button>
            <button class="opt-card">
              <span class="icon-mark"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg></span>
              <div class="opt-meta"><span class="opt-title">Short walks</span><span class="opt-sub">Senior · gentle activity preferred</span></div>
              <span class="checkbox-paw"></span>
            </button>
            <button class="opt-card">
              <span class="icon-mark"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
              <div class="opt-meta"><span class="opt-title">Still figuring out</span><span class="opt-sub">New to us, varies day-to-day</span></div>
              <span class="checkbox-paw"></span>
            </button>
          </div>
          <div class="cta-stack"><button class="btn">Continue</button></div>
        </section>
      </div>
    </div>
    <div class="legend">
      <strong>Step 06 · Personality (single-select)</strong><br>
      Round paw-checkbox in the right edge of each card. Tap any card to select; selection state is communicated by honey-tint fill + checked paw — no border line.
    </div>
  </div>
</main>
</body>
</html>
